name: Weekly Price Update

on:
  # 매주 월요일 오전 8시 NZ 시간 (NZST 기준 UTC 일요일 20:00)
  # 서머타임(NZDT, 10월~3월)에는 NZ 시간 09:00에 실행됨 — 운영상 무방
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # npm ci는 lock 파일이 100% sync 안 되면 실패해서 가격 수집 자체가 멈춤.
        # 가격 캐시만 갱신하는 가벼운 작업이라 install로 충분 (--no-save는 lock 변경 방지).
        run: npm install --no-save --no-audit --no-fund

      - name: Fetch Woolworths AU prices
        run: node scripts/update_prices.mjs

      - name: Commit and push price cache
        run: |
          git config user.name "Aussie Lunchbox Bot"
          git config user.email "bot@aussielunchbox.com.au"
          git add data/price_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🛒 Woolworths 가격 업데이트 ($(date '+%Y-%m-%d'))"
            git push origin main
          fi
