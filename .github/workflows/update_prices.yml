name: Weekly Price Update

on:
  # 매주 화요일 오전 8시 AEST (월요일 22:00 UTC)
  schedule:
    - cron: "0 22 * * 1"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Woolworths AU prices
        run: node scripts/update_prices.mjs

      - name: Commit and push price cache
        run: |
          git config user.name "Aussie Lunchbox Bot"
          git config user.email "bot@aussielunchbox.com.au"
          git add data/price_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🛒 Woolworths 가격 업데이트 ($(date '+%Y-%m-%d'))"
            git push origin main
          fi
